---
# Create the namespace before the Helm install so these secrets can exist first.
apiVersion: v1
kind: Namespace
metadata:
  name: infisical
---
# Environment variables loaded into the Infisical container via kubeSecretRef.
# These are demo values — never use them in production.
apiVersion: v1
kind: Secret
metadata:
  name: infisical-secrets
  namespace: infisical
stringData:
  ENCRYPTION_KEY: "6c1fe4e407b8911c6c1fe4e407b8911c"
  AUTH_SECRET: "workshop-auth-secret-for-jwt-do-not-use-in-production"
  SITE_URL: "http://localhost"
