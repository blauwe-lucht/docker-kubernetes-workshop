---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical
spec:
  provider:
    infisical:
      hostAPI: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080
      auth:
        tokenAuthCredentials:
          accessToken:
            name: infisical-creds
            key: accessToken
            namespace: infisical
      secretsScope:
        projectSlug: demo-ws
        environmentSlug: dev
