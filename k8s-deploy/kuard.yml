---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuard
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kuard
  template:
    metadata:
      labels:
        app: kuard
    spec:
      containers:
        - name: kuard
          image: ongoonku/kuard-amd64:blue
          livenessProbe:
            httpGet:
              path: /healthy
              port: 8080
          ports:
            - containerPort: 8080
              protocol: TCP
