services:
  proxy:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - game-collection
      - samtris

  game-collection:
    image: tcgarcao/game-collection
    volumes:
      - highscores:/app/highscores

  samtris:
    image: blauwelucht/samtris

volumes:
  highscores:
