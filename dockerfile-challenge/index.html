<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bingo Tracker</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: Arial, sans-serif;
                background: #1a1a2e;
                color: #fff;
                height: 100vh;
                display: flex;
                overflow: hidden;
            }

            #ball-history-panel {
                width: 60%;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: clamp(6px, 1.5vmin, 24px);
                border-right: 2px solid #333;
            }

            #grid {
                display: grid;
                grid-template-columns: repeat(10, 1fr);
                gap: clamp(3px, 0.6vmin, 10px);
                /* fit width, but never wider than what lets 9 rows fit in height */
                width: min(calc(60vw - 3vmin), calc((100vh - 3vmin) * 10 / 9));
            }

            .ball {
                aspect-ratio: 1;
                width: 100%;
                border-radius: 50%;
                background: #555;
                color: #000;
                font-weight: bold;
                font-size: min(4vw, 6vh);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                user-select: none;
                border: 2px solid #333;
                transition:
                    background 0.15s,
                    transform 0.1s,
                    border-color 0.15s;
            }

            .ball:hover {
                transform: scale(1.12);
                border-color: #aaa;
            }

            .ball.drawn {
                background: #f5a623;
                border-color: #c47d00;
            }

            .ball.drawn:hover {
                border-color: #e09000;
            }

            #last-ball-panel {
                width: 40%;
                height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: clamp(12px, 2vmin, 32px);
                position: relative;
            }

            #last-ball {
                width: min(38vw, 80vh);
                aspect-ratio: 1;
                border-radius: 50%;
                background: #555;
                border: 4px solid #333;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: min(29vw, 60vh);
                font-weight: bold;
                color: #000;
                transition:
                    background 0.2s,
                    border-color 0.2s;
            }

            #last-ball.active {
                background: #f5a623;
                border-color: #c47d00;
            }

            #last-ball-number {
                line-height: 1;
            }

            #clear-btn {
                position: absolute;
                bottom: clamp(12px, 2vmin, 28px);
                right: clamp(12px, 2vmin, 28px);
                padding: clamp(8px, 1.5vh, 16px) clamp(20px, 4vw, 50px);
                font-size: clamp(0.85rem, 2vmin, 1.2rem);
                font-weight: bold;
                letter-spacing: 0.05em;
                background: #c0392b;
                color: #fff;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                transition:
                    background 0.15s,
                    transform 0.1s;
            }

            #clear-btn:hover {
                background: #e74c3c;
                transform: scale(1.05);
            }

            #clear-btn:active {
                transform: scale(0.97);
            }
        </style>
    </head>
    <body>
        <div id="ball-history-panel">
            <div id="grid"></div>
        </div>

        <div id="last-ball-panel">
            <div id="last-ball">
                <span id="last-ball-number">–</span>
            </div>
            <button id="clear-btn">Nieuwe ronde</button>
        </div>

        <script>
            const grid = document.getElementById("grid");
            const lastBall = document.getElementById("last-ball");
            const lastBallNumber = document.getElementById("last-ball-number");
            let lastDrawn = null;

            // Build balls 1–90
            for (let i = 1; i <= 90; i++) {
                const ball = document.createElement("div");
                ball.className = "ball";
                ball.textContent = i;
                ball.dataset.number = i;
                ball.addEventListener("click", () => toggleBall(ball));
                grid.appendChild(ball);
            }

            function toggleBall(ball) {
                const num = ball.dataset.number;

                if (ball.classList.contains("drawn")) {
                    // Un-draw it
                    ball.classList.remove("drawn");
                    // If this was the last drawn, clear the display
                    if (lastDrawn === num) {
                        lastDrawn = null;
                        lastBallNumber.textContent = "–";
                        lastBall.classList.remove("active");
                    }
                } else {
                    // Draw it
                    ball.classList.add("drawn");
                    lastDrawn = num;
                    lastBallNumber.textContent = num;
                    lastBall.classList.add("active");
                }
            }

            document
                .getElementById("clear-btn")
                .addEventListener("click", () => {
                    document
                        .querySelectorAll(".ball.drawn")
                        .forEach((b) => b.classList.remove("drawn"));
                    lastDrawn = null;
                    lastBallNumber.textContent = "–";
                    lastBall.classList.remove("active");
                });
        </script>
    </body>
</html>
