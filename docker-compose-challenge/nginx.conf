events {}

http {
    server {
        listen 80;
        server_name site1.local;

        location / {
            proxy_pass http://site1:PORT;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 80;
        server_name site2.local;

        location / {
            proxy_pass http://site2:PORT;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
