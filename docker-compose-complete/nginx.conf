server {
    listen 8080;

    # Use Docker's internal DNS server instead of resolving at startup.
    # valid=5s overrides the TTL so nginx re-queries every 5 seconds,
    # picking up added/removed containers within that window.
    resolver 127.0.0.11 valid=5s;

    location / {
        # Setting the upstream as a variable (instead of a literal hostname in
        # proxy_pass) forces nginx to re-resolve the hostname on every request
        # rather than caching the IP permanently at startup.
        set $upstream adminer;
        proxy_pass http://$upstream:8080;

        # When a backend fails with a connection error or timeout, retry the
        # request on the next available replica instead of immediately returning
        # a 502/504 to the client. nginx will work through all replicas
        # until it finds one that responds.
        # Note: there is still a ~5s window (the resolver TTL) during which a
        # removed replica may be tried. proxy_next_upstream corrects that by
        # falling through to a live replica on the same request.
        proxy_connect_timeout 1s;  # give up on a dead replica quickly before trying the next
        proxy_next_upstream error timeout;
        proxy_next_upstream_tries 0;  # 0 = unlimited, tries all replicas
    }
}
