---
apiVersion: batch/v1
kind: Job
metadata:
  name: batch-job
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: batch-job
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              echo "Job started"
              for i in 1 2 3 4 5; do
                echo "Processing item $i..."
                sleep 1
              done
              echo "Job complete"
          resources:
            limits:
              memory: 64Mi
              cpu: "0.1"
            requests:
              memory: 32Mi
              cpu: "0.05"
